version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vscx
      POSTGRES_PASSWORD: vscx
      POSTGRES_DB: vscx
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vscx"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://vscx:vscx@postgres:5432/vscx
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      SECRET_KEY: dev-secret-key-for-docker-testing-only-32chars
      ALLOW_PRIVATE_TARGETS: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app
    command: ["/app/startup.sh", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  celery:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    command: ["/app/startup.sh", "celery", "-A", "app.services.celery_app", "worker", "-l", "info"]
    environment:
      DATABASE_URL: postgresql+asyncpg://vscx:vscx@postgres:5432/vscx
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      SECRET_KEY: dev-secret-key-for-docker-testing-only-32chars
      ALLOW_PRIVATE_TARGETS: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app

volumes:
  postgres_data:
